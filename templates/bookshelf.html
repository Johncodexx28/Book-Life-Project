{% extends 'base.html' %} {% block content %}
<div class="mb-12 text-center animate-fade-in">
  <h1 class="text-4xl font-display font-bold text-gray-800 mb-3">
    Your Digital Bookshelf 📚
  </h1>
  <p class="text-gray-500 font-medium">
    Click on a year to open your memory album for that year.
  </p>
</div>

<div class="max-w-4xl mx-auto animate-slide-up">
  <!-- The Bookshelf Frame -->
  <div
    class="bg-pastel-brown/20 p-8 rounded-[2rem] shadow-2xl border-4 border-pastel-brown/40 relative"
  >
    <div
      class="absolute inset-0 bg-wood-pattern opacity-10 rounded-[2rem] pointer-events-none"
    ></div>

    <!-- Shelf Level 1 -->
    <div class="shelf-container relative">
      <div
        class="flex flex-wrap items-end gap-6 min-h-[220px] px-8 py-4 z-10 relative pl-12 pb-2"
      >
        {% for year in years %}
        <!-- Year Book -->
        <a
          href="{{ url_for('year_view', year=year) }}"
          class="group relative transition-transform duration-300 hover:-translate-y-4 hover:scale-105 z-20"
        >
          <!-- Book Shadow -->
          <div
            class="absolute -bottom-2 left-2 right-1 h-4 bg-black/20 blur-md rounded-full group-hover:bg-black/30 transition-all"
          ></div>

          <!-- Book Body -->
          <div
            class="w-16 h-48 bg-gradient-to-br {% if loop.index0 % 4 == 0 %} from-pastel-darkpink to-pink-300 text-white {% elif loop.index0 % 4 == 1 %} from-pastel-sage to-green-300 text-green-900 {% elif loop.index0 % 4 == 2 %} from-blue-200 to-blue-300 text-blue-900 {% else %} from-pastel-lavender to-purple-300 text-purple-900 {% endif %} rounded-l-lg rounded-r-sm shadow-[inset_-4px_0_10px_rgba(0,0,0,0.1),_2px_2px_8px_rgba(0,0,0,0.3)] border-l-4 border-white/40 flex flex-col items-center justify-between py-6 group-hover:shadow-[0_0_20px_rgba(255,179,198,0.6)]"
          >
            <!-- Book Decor Top -->
            <div class="w-full px-2">
              <div class="h-1 bg-white/40 rounded w-full mb-1"></div>
              <div class="h-[2px] bg-white/30 rounded w-full"></div>
            </div>

            <!-- Year Text (Vertical) -->
            <div
              class="writing-vertical font-display font-bold text-2xl tracking-widest drop-shadow-sm"
            >
              {{ year }}
            </div>

            <!-- Book Decor Bottom -->
            <div class="w-full px-2 flex flex-col items-center">
              <i class="fa-solid fa-star text-[10px] opacity-70 mb-2"></i>
              <div class="h-[2px] bg-white/30 rounded w-full mb-1"></div>
              <div class="h-1 bg-white/40 rounded w-full"></div>
            </div>
          </div>
        </a>
        {% endfor %}

        <!-- Add New Year Book -->
        <button
          type="button"
          onclick="
            document.getElementById('add-year-modal').classList.remove('hidden')
          "
          class="group relative transition-transform duration-300 hover:scale-105 z-20 opacity-70 hover:opacity-100"
        >
          <div
            class="w-16 h-44 bg-gray-100/50 backdrop-blur-sm rounded-l-lg rounded-r-sm border-2 border-dashed border-gray-400 flex items-center justify-center shadow-inner"
          >
            <i
              class="fa-solid fa-plus text-2xl text-gray-400 group-hover:text-gray-600"
            ></i>
          </div>
        </button>
      </div>
      <!-- The Wood Shelf Planks -->
      <div
        class="h-6 w-full bg-pastel-darkbrown rounded-lg shadow-[inset_0_-4px_8px_rgba(0,0,0,0.2),_0_4px_10px_rgba(0,0,0,0.3)] relative z-30"
      >
        <div
          class="absolute inset-0 bg-wood-pattern opacity-20 rounded-lg mix-blend-multiply"
        ></div>
        <div class="h-1 w-full bg-white/20 rounded-t-lg"></div>
      </div>
      <div
        class="h-4 w-11/12 mx-auto bg-black/10 rounded-b-xl blur-sm mb-8"
      ></div>
    </div>
  </div>
</div>

<!-- Modal: Add New Year -->
<div
  id="add-year-modal"
  class="hidden fixed inset-0 z-50 flex items-center justify-center p-4"
>
  <div
    class="absolute inset-0 bg-gray-900/40 backdrop-blur-sm"
    onclick="document.getElementById('add-year-modal').classList.add('hidden')"
  ></div>
  <div
    class="bg-white rounded-[2rem] p-8 max-w-sm w-full relative z-10 shadow-2xl animate-fade-in-up"
  >
    <h3 class="text-2xl font-display font-bold text-gray-800 mb-4">
      Start a new chapter ✨
    </h3>
    <form action="{{ url_for('bookshelf') }}" method="GET" class="space-y-4">
      <!-- Technically this doesn't 'save' a year until an image is uploaded, 
                 so we will just redirect to the year_view with the given year -->
      <div>
        <label class="block text-sm font-semibold text-gray-700 mb-2 ml-1"
          >Which year?</label
        >
        <input
          type="number"
          id="new_year_input"
          value="2024"
          min="1900"
          max="2100"
          class="w-full px-4 py-3 rounded-xl bg-gray-50 border border-gray-200 focus:border-pastel-darkpink focus:ring-4 focus:ring-pastel-pink/50 outline-none"
        />
      </div>
      <div class="flex gap-3 mt-6">
        <button
          type="button"
          onclick="
            document.getElementById('add-year-modal').classList.add('hidden')
          "
          class="flex-1 py-3 px-4 bg-gray-100 hover:bg-gray-200 text-gray-700 font-semibold rounded-xl transition-colors"
        >
          Cancel
        </button>
        <button
          type="button"
          onclick="
            window.location.href =
              '/year/' + document.getElementById('new_year_input').value
          "
          class="flex-1 py-3 px-4 bg-pastel-darkpink hover:bg-pink-400 text-white font-semibold rounded-xl transition-colors shadow-md"
        >
          Open
        </button>
      </div>
    </form>
  </div>
</div>
{% endblock %}
